<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResearchAgent — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #07070e;
      --surface: #0e0e1a;
      --border: #1a1a2e;
      --accent: #7c6af7;
      --accent2: #e05cff;
      --green: #3dfabc;
      --red: #ff5c5c;
      --text: #e8e8f0;
      --muted: #55556a;
      --card: #10101e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: rgba(124,106,247,0.12); top: -150px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: rgba(224,92,255,0.08); bottom: -100px; right: -80px; animation-delay: -4s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 20px); } }

    /* Noise */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 100; opacity: 0.35;
    }

    .card {
      position: relative; z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: risein 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes risein { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }
    .brand h1 {
      font-size: 1.45rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.01em;
    }
    .brand p { color: var(--muted); font-size: 0.82rem; margin-top: 0.3rem; }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1; text-align: center;
      padding: 0.55rem;
      border-radius: 7px;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .tab.active { background: var(--border); color: var(--text); }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.45rem; font-family: 'IBM Plex Mono', monospace; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      padding: 0.85rem;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted); font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-google {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.65rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: var(--accent); background: var(--border); }

    .google-icon { width: 18px; height: 18px; }

    .msg {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'IBM Plex Mono', monospace;
      display: none;
    }
    .msg.error { background: rgba(255,92,92,0.08); border: 1px solid rgba(255,92,92,0.25); color: var(--red); display: block; }
    .msg.success { background: rgba(61,250,188,0.08); border: 1px solid rgba(61,250,188,0.25); color: var(--green); display: block; }
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🔬</div>
    <h1>ResearchAgent</h1>
    <p>Multi-agent AI research pipeline</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- Sign In Form -->
  <div id="signinForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="siEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="siPassword" placeholder="••••••••"/>
    </div>
    <button class="btn-primary" id="siBtn" onclick="signIn()">Sign In</button>

    <div class="divider">or continue with</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.9l6-6C34.5 3.1 29.6 1 24 1 14.8 1 7 6.6 3.7 14.4l7 5.4C12.4 13.7 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
        <path fill="#FBBC05" d="M10.7 28.2A14.5 14.5 0 0 1 9.5 24c0-1.5.3-2.9.7-4.2l-7-5.4A23 23 0 0 0 1 24c0 3.8.9 7.4 2.7 10.6l7-5.4z"/>
        <path fill="#34A853" d="M24 47c5.6 0 10.3-1.8 13.8-5l-7.4-5.7c-1.8 1.2-4.1 1.9-6.4 1.9-6.3 0-11.6-4.2-13.3-10l-7 5.4C7 41.4 14.8 47 24 47z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- Sign Up Form -->
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="suName" placeholder="Your name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="suEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="suPassword" placeholder="Min. 6 characters"/>
    </div>
    <button class="btn-primary" id="suBtn" onclick="signUp()">Create Account</button>

    <div class="divider">or continue with</div>
    <button class="btn-google" onclick="signInGoogle()">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.9l6-6C34.5 3.1 29.6 1 24 1 14.8 1 7 6.6 3.7 14.4l7 5.4C12.4 13.7 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
        <path fill="#FBBC05" d="M10.7 28.2A14.5 14.5 0 0 1 9.5 24c0-1.5.3-2.9.7-4.2l-7-5.4A23 23 0 0 0 1 24c0 3.8.9 7.4 2.7 10.6l7-5.4z"/>
        <path fill="#34A853" d="M24 47c5.6 0 10.3-1.8 13.8-5l-7.4-5.7c-1.8 1.2-4.1 1.9-6.4 1.9-6.3 0-11.6-4.2-13.3-10l-7 5.4C7 41.4 14.8 47 24 47z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const SUPABASE_URL = "{{ supabase_url }}";
  const SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0 && tab==='signin')||(i===1 && tab==='signup')));
    document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    clearMsg();
  }

  function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + type;
  }
  function clearMsg() {
    document.getElementById('msg').className = 'msg';
  }

  async function sendSessionToFlask(session) {
    const res = await fetch('/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: session.access_token })
    });
    return res.ok;
  }

  async function signIn() {
    const btn = document.getElementById('siBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    const email = document.getElementById('siEmail').value.trim();
    const password = document.getElementById('siPassword').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Sign In'; return; }
    if (await sendSessionToFlask(data.session)) window.location.href = '/app';
    else showMsg('Session error. Try again.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }

  async function signUp() {
    const btn = document.getElementById('suBtn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    const name = document.getElementById('suName').value.trim();
    const email = document.getElementById('suEmail').value.trim();
    const password = document.getElementById('suPassword').value;
    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Create Account'; return; }
    if (data.session) {
      if (await sendSessionToFlask(data.session)) { window.location.href = '/app'; return; }
    }
    showMsg('Account created! Check your email to confirm, then sign in.', 'success');
    btn.disabled = false; btn.textContent = 'Create Account';
  }

  async function signInGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/auth/callback' }
    });
    if (error) showMsg(error.message, 'error');
  }

  // Handle OAuth callback hash
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      if (await sendSessionToFlask(session)) window.location.href = '/app';
    }
  })();

  // Keyboard enter
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const siVisible = document.getElementById('signinForm').style.display !== 'none';
    if (siVisible) signIn(); else signUp();
  });
</script>
</body>
</html>
