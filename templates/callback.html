<!DOCTYPE html>
<html>
<head>
  <title>Signing in…</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#07070e; color:#e8e8f0; font-family:'Segoe UI',sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .msg { text-align:center; }
    .spin { width:32px; height:32px; border:3px solid #1a1a2e; border-top-color:#7c6af7;
            border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#55556a; font-size:0.85rem; }
  </style>
</head>
<body>
<div class="msg">
  <div class="spin"></div>
  <p>Completing sign-in…</p>
</div>
<script>
  const SUPABASE_URL = "{{ supabase_url }}";
  const SUPABASE_ANON_KEY = "{{ supabase_anon_key }}";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  (async () => {
    const { data: { session }, error } = await sb.auth.getSession();
    if (session) {
      const res = await fetch('/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ access_token: session.access_token })
      });
      if (res.ok) { window.location.href = '/app'; return; }
    }
    window.location.href = '/login';
  })();
</script>
</body>
</html>
